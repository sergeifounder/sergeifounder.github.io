<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Sergei Krushinskikh</title>
<meta name="description" content="Get in touch with Sergei Krushinskikh. Technical partnerships, consulting, product development.">
<link rel="canonical" href="https://sergeifounder.com/contact">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --card: #111111;
  --card-border: rgba(255,255,255,0.06);
  --cyan: #22d3ee;
  --green: #20d4a0;
  --white: #fafafa;
  --text: #e5e2e1;
  --text-muted: #8c8c8c;
  --text-dim: #595959;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; line-height: 1.7; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 max(2rem, 5vw); height: 64px; display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,10,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); }
.nav-name { font-weight: 900; font-size: 1.05rem; color: var(--white); letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); transition: color 0.2s; }
.nav-links a:hover { color: var(--white); }
.nav-links a.active { color: var(--white); }

.container { max-width: 680px; margin: 0 auto; padding: 120px 24px 80px; }

.contact-hero { display: grid; grid-template-columns: 140px 1fr; gap: 32px; align-items: center; margin-bottom: 56px; }
@media (max-width: 480px) { .contact-hero { grid-template-columns: 1fr; text-align: center; } }
.contact-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; object-position: center top; }
@media (max-width: 480px) { .contact-photo { margin: 0 auto; } }
.contact-hero h1 { font-size: 2rem; font-weight: 900; color: var(--white); letter-spacing: -0.03em; margin-bottom: 8px; }
.contact-hero p { font-size: 1rem; color: var(--text-muted); }

.contact-channels { display: flex; flex-direction: column; gap: 12px; margin-bottom: 56px; }
.channel { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.3s; }
.channel:hover { border-color: rgba(255,255,255,0.12); }
.channel-name { font-weight: 600; color: var(--white); }
.channel-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--cyan); transition: opacity 0.2s; }
.channel-value:hover { opacity: 0.7; }

.contact-form { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 36px; }
.form-title { font-size: 1.2rem; font-weight: 900; color: var(--white); margin-bottom: 24px; letter-spacing: -0.01em; }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
.form-input, .form-textarea { width: 100%; background: var(--bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px 16px; font-family: 'Inter', sans-serif; font-size: 0.95rem; color: var(--white); outline: none; transition: border-color 0.2s; }
.form-input:focus, .form-textarea:focus { border-color: var(--cyan); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-submit { background: var(--cyan); color: var(--bg); border: none; border-radius: 8px; padding: 14px 32px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; width: 100%; }
.form-submit:hover { opacity: 0.85; }

.footer { max-width: 680px; margin: 0 auto; padding: 32px 24px; border-top: 1px solid var(--card-border); }
.footer-copy { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); text-align: center; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-name" href="/">Sergei Krushinskikh</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/now">Now</a>
    <a href="/contact" class="active">Contact</a>
  </div>
</nav>

<div class="container">

<div class="contact-hero">
  <img src="hero.jpg" alt="Sergei Krushinskikh" class="contact-photo">
  <div>
    <h1>Let's talk.</h1>
    <p>Technical partnerships, product development, consulting, or just want to say hi.</p>
  </div>
</div>

<div class="contact-channels">
  <a href="mailto:sergei@sergeifounder.com" class="channel">
    <span class="channel-name">Email</span>
    <span class="channel-value">sergei@sergeifounder.com</span>
  </a>
  <a href="https://linkedin.com/in/sergei-krushinskikh" class="channel" target="_blank" rel="noopener">
    <span class="channel-name">LinkedIn</span>
    <span class="channel-value">in/sergei-krushinskikh</span>
  </a>
  <a href="https://twitter.com/sergeifounder" class="channel" target="_blank" rel="noopener">
    <span class="channel-name">X (Twitter)</span>
    <span class="channel-value">@sergeifounder</span>
  </a>
  <a href="https://t.me/sergeifounder" class="channel" target="_blank" rel="noopener">
    <span class="channel-name">Telegram</span>
    <span class="channel-value">@sergeifounder</span>
  </a>
</div>

<div class="contact-form">
  <div class="form-title">Send a message</div>
  <form action="https://formspree.io/f/sergei@sergeifounder.com" method="POST">
    <div class="form-group">
      <label class="form-label" for="name">Name</label>
      <input class="form-input" type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="message">Message</label>
      <textarea class="form-textarea" id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="form-submit">Send Message</button>
  </form>
</div>

</div>

<footer class="footer">
  <div class="footer-copy">&copy; 2026 Sergei Krushinskikh</div>
</footer>

</body>
</html>
